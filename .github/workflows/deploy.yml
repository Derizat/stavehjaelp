name: Deploy to GitHub Pages

  on:
    push:
      branches: [main, v2]

  permissions:
    contents: read
    pages: write
    id-token: write

  concurrency:
    group: "pages"
    cancel-in-progress: false

  jobs:
    deploy:
      runs-on: ubuntu-latest
      environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}
      steps:
        - name: Checkout main
          uses: actions/checkout@v4
          with:
            ref: main
            path: main

        - name: Checkout v2
          uses: actions/checkout@v4
          with:
            ref: v2
            path: v2-src

        - name: Build combined site
          run: |
            mkdir -p _site/v2
            cp -r main/* _site/ 2>/dev/null || true
            cp -r v2-src/* _site/v2/ 2>/dev/null || true
            rm -rf _site/.github _site/v2/.github
            rm -rf _site/.git _site/v2/.git

        - name: Setup Pages
          uses: actions/configure-pages@v4

        - name: Upload artifact
          uses: actions/upload-pages-artifact@v3
          with:
            path: _site

        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@v4
